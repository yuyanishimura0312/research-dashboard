<script>
const DATA = Array.isArray(window.RESEARCH_DATA) ? window.RESEARCH_DATA : [];
const STATUS_COLORS = { investigating:'#CE6F3C', reading:'#7A8B6E', organized:'#96725E', done:'#7A4033' };
const STATUS_LABELS = { investigating:'Investigating', reading:'Reading', organized:'Organized', done:'Completed' };

// Lightweight Markdown renderer
function renderMd(text) {
  if (!text) return '';
  let h = esc(text);
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_, l, c) => `<pre>${c}</pre>`);
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  h = h.replace(/^---+$/gm, '<hr>');
  h = h.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
  h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  h = h.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  h = h.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
  h = h.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  h = h.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  h = h.replace(/\n\n/g, '</p><p>');
  h = h.replace(/\n/g, '<br>');
  return `<div class="md-content"><p>${h}</p></div>`;
}
const EXCLUDED_TAGS = new Set(['Gemini','Google Drive']);
// Meta/dashboard articles to exclude from editorial display
const META_KEYWORDS = ['ベンチマーク調査','ダッシュボード','ベストプラクティス','CSS','HTML','JavaScript','BM25','Louvain','PageRank','ナレッジグラフ高度化','実装パターン','世界ベンチマーク'];
function isMetaArticle(d) {
  const t = d.title || '';
  return META_KEYWORDS.some(k => t.includes(k));
}
let activeCategory = '';

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function formatDate(iso) {
  const d = new Date(iso);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}
function readTime(d) {
  if (typeof d === 'string') return Math.max(1, Math.round(d.length / 400)); // legacy
  const text = d.content || d.summary || '';
  return Math.max(1, Math.round(text.length / 400));
}
function getFiltered() {
  let d = [...DATA].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  if (activeCategory) d = d.filter(x => x.category === activeCategory);
  return d;
}
// Editorial content = exclude meta articles + entries with no content and no source
function hasReadableContent(d) {
  const text = d.content || d.summary || '';
  return text.trim().length >= 50 || (d.source && d.source.trim().length > 0);
}
function getEditorial() { return getFiltered().filter(d => !isMetaArticle(d) && hasReadableContent(d)); }

// ===== Category bar =====
function renderCatBar() {
  const cats = {};
  DATA.forEach(d => { if (d.category) cats[d.category] = (cats[d.category]||0)+1; });
  const sorted = Object.entries(cats).sort((a,b) => b[1]-a[1]);
  document.getElementById('catBar').innerHTML =
    `<a class="cat-link ${activeCategory===''?'active':''}" href="#" onclick="filterCat('');return false">All</a>` +
    sorted.map(([c]) =>
      `<a class="cat-link ${activeCategory===c?'active':''}" href="#" onclick="filterCat('${c}');return false">${esc(c)}</a>`
    ).join('');
}
function filterCat(c) { activeCategory = c; renderAll(); window.scrollTo({top:0,behavior:'smooth'}); }

// ===== Card HTML =====
function cardHTML(d, opts={}) {
  const s = d.status || 'investigating';
  const cls = opts.compact ? 'article-card card-compact' : 'article-card';
  const titleCls = opts.large ? 'card-title card-title-lg' : 'card-title';
  return `
    <div class="${cls} animate-in" onclick="openReader('${d.id}')">
      ${opts.large ? '<div class="card-accent-bar"></div>' : ''}
      <div class="card-category">${esc(d.category||'')}</div>
      <div class="${titleCls}">${esc(d.title)}</div>
      ${d.summary && !opts.noSummary ? `<div class="card-summary">${esc(d.summary)}</div>` : ''}
      <div class="card-meta">
        <span class="status-dot" style="background:${STATUS_COLORS[s]}"></span>${STATUS_LABELS[s]}
        <span style="margin-left:12px">${formatDate(d.createdAt)}</span>
        <span style="margin-left:12px">${readTime(d)} min</span>
      </div>
    </div>`;
}

// ===== Hero =====
function renderHero() {
  const editorial = getEditorial();
  const featured = editorial.filter(d => d.summary && d.summary.length > 60);
  const d = featured[0] || editorial[0];
  if (!d) return;
  document.getElementById('heroSection').innerHTML = `
    <div class="hero-inner" style="cursor:pointer" onclick="openReader('${d.id}')">
      <div class="hero-label">${esc(d.category||'Research')}</div>
      <h1 class="hero-title">${esc(d.title)}</h1>
      <p class="hero-summary">${esc((d.summary||'').slice(0, 220))}${(d.summary||'').length > 220 ? '...' : ''}</p>
      <div class="hero-meta">
        <span>${formatDate(d.createdAt)}</span>
        <span>${readTime(d)} min read</span>
        <span>${STATUS_LABELS[d.status||'investigating']}</span>
      </div>
    </div>`;
}

// ===== Dashboard strip =====
function renderDashboard() {
  const now = new Date();
  const thisMonth = DATA.filter(d => { const dd = new Date(d.createdAt); return dd.getFullYear() === now.getFullYear() && dd.getMonth() === now.getMonth(); }).length;
  const cats = new Set(DATA.map(d => d.category).filter(Boolean)).size;
  const done = DATA.filter(d => d.status === 'done').length;
  const pct = DATA.length > 0 ? Math.round(done / DATA.length * 100) : 0;

  document.getElementById('dashStats').innerHTML = `
    <div class="dash-stat"><div class="ds-value">${DATA.length}</div><div class="ds-label">Total Research</div></div>
    <div class="dash-stat"><div class="ds-value">${thisMonth}</div><div class="ds-label">This Month</div></div>
    <div class="dash-stat"><div class="ds-value">${cats}</div><div class="ds-label">Categories</div></div>
    <div class="dash-stat"><div class="ds-value">${pct}%</div><div class="ds-label">Completed</div></div>
  `;

  const sc = { investigating:0, reading:0, organized:0, done:0 };
  DATA.forEach(d => { sc[d.status||'investigating']++; });
  document.getElementById('dashStatus').innerHTML = Object.entries(sc).map(([k,v]) =>
    `<div class="dash-status-item" style="background:${STATUS_COLORS[k]}"><span class="ds-count">${v}</span><span class="ds-name">${STATUS_LABELS[k]}</span></div>`
  ).join('');
}

// ===== Latest grid (NYT) =====
function renderLatest() {
  const editorial = getEditorial();
  const items = editorial.slice(activeCategory ? 0 : 1, 10);
  if (items.length < 3) {
    document.getElementById('latestGrid').innerHTML = items.map(d => cardHTML(d)).join('');
    return;
  }
  document.getElementById('latestGrid').innerHTML = `
    <div class="nyt-featured">${cardHTML(items[0], {large:true})}</div>
    <div class="divider"></div>
    <div class="nyt-stack">
      ${items.slice(1,4).map((d,i,a) => cardHTML(d, {compact:true}) + (i < a.length-1 ? '<hr class="card-divider">' : '')).join('')}
    </div>
    <div class="divider"></div>
    <div class="nyt-sidebar">
      ${items.slice(4,7).map((d,i,a) => cardHTML(d, {compact:true, noSummary:true}) + (i < a.length-1 ? '<hr class="card-divider">' : '')).join('')}
    </div>`;
}

// ===== Category sections =====
function renderCategorySections() {
  if (activeCategory) { document.getElementById('categorySections').innerHTML = ''; return; }
  const editorial = DATA.filter(d => !isMetaArticle(d));
  const cats = {};
  editorial.forEach(d => { if (d.category) cats[d.category] = (cats[d.category]||0)+1; });
  document.getElementById('categorySections').innerHTML = Object.entries(cats)
    .sort((a,b) => b[1]-a[1]).slice(0, 4).map(([cat]) => {
    const items = editorial.filter(d => d.category === cat)
      .sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt)).slice(0, 4);
    return `
      <section class="section" style="border-top:1px solid var(--border);">
        <div class="section-header">
          <h2 class="section-title">${esc(cat)}</h2>
          <a class="section-more" href="#" onclick="filterCat('${cat}');return false">See all &#8594;</a>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:24px;">
          ${items.map(d => cardHTML(d, {compact:true})).join('')}
        </div>
      </section>`;
  }).join('');
}

// ===== Topics =====
function renderTopics() {
  const cats = {};
  const editorial = DATA.filter(d => !isMetaArticle(d) && hasReadableContent(d));
  editorial.forEach(d => { if (d.category) cats[d.category] = (cats[d.category]||0)+1; });
  document.getElementById('topicGrid').innerHTML = Object.entries(cats)
    .sort((a,b) => b[1]-a[1])
    .map(([c,n]) => `
      <div class="topic-tile animate-in" onclick="filterCat('${c}')">
        <div class="topic-count">${n}</div>
        <div class="topic-name">${esc(c)}</div>
      </div>`).join('');
}

// ===== BM25-based Related entries =====
function tokenize(text) {
  if (!text) return [];
  const clean = text.toLowerCase().replace(/[\s\n\r]+/g, ' ').trim();
  const tokens = [];
  // Character bi-grams (works for Japanese)
  for (let i = 0; i <= clean.length - 2; i++) {
    const g = clean.slice(i, i + 2);
    if (!/^\s*$/.test(g)) tokens.push(g);
  }
  // Words
  clean.split(/[\s,、。．.!！?？・\-—:：;；()（）\[\]「」『』]+/).filter(w => w.length >= 2).forEach(w => tokens.push(w));
  return tokens;
}

let _relCache = {};
function getRelated(id, topN) {
  if (_relCache[id]) return _relCache[id].slice(0, topN);
  const idx = DATA.findIndex(d => d.id === id);
  if (idx < 0) return [];
  const entry = DATA[idx];
  const entryText = [entry.title, entry.title, entry.category, entry.summary, (entry.tags||[]).join(' ')].join(' ');
  const entryTokens = tokenize(entryText);
  const entryFreq = {};
  entryTokens.forEach(t => { entryFreq[t] = (entryFreq[t] || 0) + 1; });

  const scores = DATA.map((d, i) => {
    if (i === idx) return null;
    const dText = [d.title, d.category, d.summary, (d.tags||[]).join(' ')].join(' ');
    const dTokens = tokenize(dText);
    const dFreq = {};
    dTokens.forEach(t => { dFreq[t] = (dFreq[t] || 0) + 1; });

    // Cosine similarity on token frequencies
    let dot = 0, magA = 0, magB = 0;
    for (const t in entryFreq) {
      if (dFreq[t]) dot += entryFreq[t] * dFreq[t];
      magA += entryFreq[t] * entryFreq[t];
    }
    for (const t in dFreq) magB += dFreq[t] * dFreq[t];
    const sim = (magA && magB) ? dot / (Math.sqrt(magA) * Math.sqrt(magB)) : 0;

    // Boost for same category and tag overlap
    const eTags = new Set((entry.tags||[]).filter(t=>!EXCLUDED_TAGS.has(t)));
    const tagOverlap = (d.tags||[]).filter(t=>!EXCLUDED_TAGS.has(t)&&eTags.has(t)).length;
    const catBoost = d.category === entry.category ? 0.05 : 0;

    return { d, score: sim + tagOverlap * 0.02 + catBoost };
  }).filter(x => x && x.score > 0.05).sort((a,b) => b.score - a.score).slice(0, 8);

  _relCache[id] = scores;
  return scores.slice(0, topN);
}

// ===== Article Reader =====
function getGoogleDocsUrl(src) {
  if (!src) return '';
  const m = src.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return `https://docs.google.com/document/d/${m[1]}/edit`;
  return src;
}

function renderSummaryContent(raw) {
  let html = '';
  const hasNewlines = raw.includes('\n');

  if (hasNewlines) {
    const lines = raw.split(/\n+/).filter(Boolean);
    let isFirst = true;
    let listBuffer = [];

    function flushList() {
      if (listBuffer.length === 0) return;
      listBuffer.forEach(item => { html += `<div class="summary-item">${esc(item)}</div>`; });
      listBuffer = [];
    }

    lines.forEach(line => {
      const t = line.trim();
      // Headers: ■ ● ▶ 【 or standalone short labels ending with :
      if (/^[■●▶【\[]/.test(t)) {
        flushList();
        html += `<h2>${esc(t.replace(/^[■●▶【\[\]】]+\s*/, '') || t)}</h2>`;
      }
      // Numbered items: 1. or 1) — render as list items, not headers
      else if (/^\d+[\.\)]\s/.test(t)) {
        listBuffer.push(t.replace(/^\d+[\.\)]\s*/, ''));
      }
      // Bullet items
      else if (/^[-・•]\s/.test(t) || /^\(\d+\)/.test(t)) {
        listBuffer.push(t.replace(/^[-・•]\s*/, '').replace(/^\(\d+\)\s*/, ''));
      }
      // Regular paragraph
      else {
        flushList();
        const cls = isFirst && t.length > 30 ? ' class="drop-cap reader-lead"' : '';
        html += `<p${cls}>${esc(t)}</p>`;
        isFirst = false;
      }
    });
    flushList();
  } else {
    // Single block — split at sentence boundaries, merge short ones
    const rawSentences = raw.split(/(?<=[。．！!？?])\s*/).filter(Boolean);

    // Merge short sentences (< 20 chars) with the next one
    const sentences = [];
    let carry = '';
    rawSentences.forEach(s => {
      carry += s;
      if (carry.length >= 20 || s === rawSentences[rawSentences.length - 1]) {
        sentences.push(carry);
        carry = '';
      }
    });
    if (carry) sentences.push(carry);

    if (sentences.length <= 1) {
      const cls = raw.length > 30 ? ' class="drop-cap reader-lead"' : '';
      html += `<p${cls}>${esc(raw)}</p>`;
    } else {
      // Group into paragraphs of 2 sentences
      let para = '';
      let isFirst = true;
      sentences.forEach((s, i) => {
        para += s;
        if ((i + 1) % 2 === 0 || i === sentences.length - 1) {
          const cls = isFirst && para.length > 30 ? ' class="drop-cap reader-lead"' : '';
          html += `<p${cls}>${esc(para)}</p>`;
          isFirst = false;
          para = '';
        }
      });
    }
  }
  return html;
}

function openReader(id) {
  const d = DATA.find(x => x.id === id);
  if (!d) return;
  const s = d.status || 'investigating';
  const tags = (d.tags||[]).filter(t=>!EXCLUDED_TAGS.has(t));
  const isGDocs = d.source && d.source.includes('docs.google.com');
  const gdocsUrl = isGDocs ? getGoogleDocsUrl(d.source) : '';

  // Header
  document.getElementById('readerHeader').innerHTML = `
    <div class="reader-cat">${esc(d.category||'')}</div>
    <h1 class="reader-title">${esc(d.title)}</h1>
    <div class="reader-meta">
      <span>${formatDate(d.createdAt)}</span>
      <span>${readTime(d)} min read</span>
      <span><span class="status-dot" style="background:${STATUS_COLORS[s]}"></span>${STATUS_LABELS[s]}</span>
    </div>`;

  let body = '';

  // Info strip
  body += `<div class="reader-info-strip">`;
  if (d.category) body += `<div class="reader-info-item"><strong>${esc(d.category)}</strong></div>`;
  body += `<div class="reader-info-item">${formatDate(d.createdAt)}</div>`;
  body += `<div class="reader-info-item">${readTime(d)} min read</div>`;
  if (tags.length > 0) body += `<div class="reader-info-item">${tags.length} tags</div>`;
  body += `</div>`;

  // Main content: render as Markdown if available
  if (d.content) {
    const text = d.content.trim();
    // Use Markdown renderer if content has markdown markers
    if (text.includes('#') || text.includes('**') || text.includes('- ')) {
      body += renderMd(text);
    } else {
      body += renderSummaryContent(text);
    }
  } else if (d.summary) {
    body += renderSummaryContent(d.summary.trim());
  }

  // Action buttons: Download + Open
  const textContent = d.content || d.summary || '';
  body += `<div style="margin-top:32px;padding-top:20px;border-top:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;align-items:center;">`;

  // Download as Markdown
  body += `<button class="reader-source" onclick="downloadReport('${d.id}')" style="cursor:pointer;border:1px solid var(--accent);background:none;">DL</button>`;

  // Open in Google Docs
  if (isGDocs) {
    body += `<a class="reader-source" href="${esc(gdocsUrl)}" target="_blank">Open</a>`;
  } else if (d.source) {
    body += `<a class="reader-source" href="${esc(d.source)}" target="_blank">Open</a>`;
  } else {
    // No source: create new Google Doc with content
    body += `<button class="reader-source" onclick="openAsGoogleDoc('${d.id}')" style="cursor:pointer;border:1px solid var(--accent);background:none;">Open</button>`;
  }

  body += `</div>`;

  // Tags
  if (tags.length > 0) {
    body += `<div class="reader-tags">${tags.map(t => `<span class="reader-tag">${esc(t)}</span>`).join('')}</div>`;
  }

  // Related (BM25)
  const related = getRelated(id, 4);
  if (related.length > 0) {
    body += `<div class="reader-related">
      <h3>Related Research</h3>
      <div class="related-grid">
        ${related.map(({d:r, score}) => `
          <div class="related-card" onclick="openReader('${r.id}');document.getElementById('reader').scrollTo(0,0);">
            <div class="card-category">${esc(r.category||'')}</div>
            <div class="card-title">${esc(r.title)}</div>
            <div class="card-meta">
              ${formatDate(r.createdAt)}
              <span style="margin-left:8px;color:var(--accent);font-weight:600;">${Math.round(score*100)}%</span>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  }

  document.getElementById('readerBody').innerHTML = body;
  document.getElementById('reader').classList.add('active');
  document.getElementById('reader').scrollTo(0, 0);
  document.body.style.overflow = 'hidden';

  // Reader progress bar
  const readerEl = document.getElementById('reader');
  const progressEl = document.getElementById('readerProgress');
  readerEl.onscroll = () => {
    const scrollTop = readerEl.scrollTop;
    const scrollHeight = readerEl.scrollHeight - readerEl.clientHeight;
    progressEl.style.width = scrollHeight > 0 ? (scrollTop / scrollHeight * 100) + '%' : '0%';
  };
}

function downloadReport(id) {
  const d = DATA.find(x => x.id === id);
  if (!d) return;
  const text = d.content || d.summary || '';
  const tags = (d.tags||[]).filter(t=>!EXCLUDED_TAGS.has(t));
  const md = `# ${d.title}\n\n**Category:** ${d.category||''}\n**Date:** ${formatDate(d.createdAt)}\n**Status:** ${STATUS_LABELS[d.status||'investigating']}\n**Tags:** ${tags.join(', ')}\n\n---\n\n${text}\n`;
  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${d.title.replace(/[\/\\:*?"<>|]/g, '_')}.md`;
  a.click();
  URL.revokeObjectURL(url);
}

function openAsGoogleDoc(id) {
  const d = DATA.find(x => x.id === id);
  if (!d) return;
  const text = d.content || d.summary || '';
  const title = encodeURIComponent(d.title);
  const body = encodeURIComponent(text);
  window.open(`https://docs.google.com/document/create?title=${title}&body=${body}`, '_blank');
}

function closeReader() {
  document.getElementById('reader').classList.remove('active');
  document.getElementById('readerProgress').style.width = '0%';
  document.body.style.overflow = '';
}

// ===== Dark mode =====
function initTheme() {
  const stored = localStorage.getItem('fes-theme');
  const theme = stored || (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeToggle').innerHTML = theme === 'dark' ? '&#9788;' : '&#9790;';
}
document.getElementById('themeToggle').addEventListener('click', () => {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('fes-theme', next);
  document.getElementById('themeToggle').innerHTML = next === 'dark' ? '&#9788;' : '&#9790;';
});

// ===== Scroll animations =====
function initScrollAnimations() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
  }, { rootMargin: '0px 0px -8% 0px', threshold: 0.1 });
  document.querySelectorAll('.animate-in').forEach(el => observer.observe(el));
}

// ===== Keyboard =====
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeReader(); });

// ===== Render =====
function renderAll() {
  renderCatBar();
  renderHero();
  renderLatest();
  renderCategorySections();
  renderTopics();
  requestAnimationFrame(initScrollAnimations);
}

initTheme();
renderAll();
</script>
</body>
</html>
