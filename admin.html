<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>管理画面 - Miratuku Research Dashboard</title>
<!-- esse-sense inverted favicon (black bg, white e) -->
<link rel="icon" href="https://esse-sense.com/favicon.ico">
<style>
  :root {
    --bg: #FFFAF6;
    --card: #FFFFFF;
    --card-hover: #FDF5EE;
    --accent: #7A4033;
    --accent-light: #FAE8DC;
    --accent-warm: #DC8766;
    --text: #1A0F0A;
    --text-muted: #7A5A48;
    --border: #E0CCBB;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    font-size: 15px;
    color: var(--text-muted);
  }

  header {
    background: linear-gradient(135deg, #7A4033 0%, #B07256 50%, #DC8766 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #ffffff;
    flex-wrap: wrap;
    gap: 12px;
  }

  header h1 { font-size: 1.3rem; font-weight: 700; color: #ffffff; }
  .header-sub { font-size: 0.75rem; color: #FAE8DC; margin-top: 2px; opacity: 0.85; }

  .header-right { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .admin-name { font-size: 0.85rem; color: #FAE8DC; }
  .header-link { font-size: 0.85rem; color: #ffffff; text-decoration: none; opacity: 0.9; }
  .header-link:hover { opacity: 1; text-decoration: underline; }

  .btn-logout {
    padding: 6px 16px;
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    color: #ffffff;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .btn-logout:hover { background: rgba(255,255,255,0.2); }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

  .section-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
  }
  .stat-label { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.03em; margin-bottom: 4px; }
  .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
  .stat-sub { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }

  .section-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 32px;
  }

  .table-wrapper { overflow-x: auto; margin: 0 -24px -24px; padding: 0 24px 24px; }

  table { width: 100%; border-collapse: collapse; min-width: 800px; }
  thead th {
    text-align: left; padding: 10px 12px; font-size: 0.72rem; font-weight: 600;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;
    border-bottom: 2px solid var(--border); white-space: nowrap;
  }
  tbody td { padding: 10px 12px; font-size: 0.82rem; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody tr:hover { background: var(--card-hover); }

  .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.72rem; font-weight: 600; }
  .badge-pending { background: rgba(202, 138, 4, 0.12); color: #92650a; }
  .badge-active { background: rgba(22, 163, 74, 0.12); color: #15803d; }
  .badge-disabled { background: rgba(220, 38, 38, 0.12); color: #b91c1c; }
  .badge-admin { background: rgba(122, 64, 51, 0.12); color: var(--accent); }
  .badge-user { background: rgba(140, 109, 94, 0.12); color: var(--text-muted); }

  .actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn {
    padding: 5px 12px; border: none; border-radius: 6px; font-size: 0.72rem;
    font-weight: 600; cursor: pointer; white-space: nowrap; font-family: inherit;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-approve { background: #16a34a; color: #fff; }
  .btn-disable { background: #dc2626; color: #fff; }
  .btn-enable { background: #2563eb; color: #fff; }
  .btn-promote { background: var(--accent); color: #fff; }
  .btn-demote { background: #6b7280; color: #fff; }

  .activity-count { text-align: center; font-variant-numeric: tabular-nums; color: var(--text); font-weight: 500; }
  .activity-count.zero { color: var(--text-muted); font-weight: 400; }
  .empty-state { text-align: center; padding: 48px 16px; color: var(--text-muted); font-size: 0.85rem; }

  @media (max-width: 768px) {
    header { padding: 16px 20px; }
    header h1 { font-size: 1.1rem; width: 100%; }
    .container { padding: 16px 12px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .stat-value { font-size: 1.4rem; }
    .section-card { padding: 16px; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">読み込み中...</div>

<div id="pageContent" style="display:none;">
  <header>
    <div>
      <h1>管理画面 - Research Dashboard</h1>
      <div class="header-sub">ユーザー管理ダッシュボード</div>
    </div>
    <div class="header-right">
      <span class="admin-name" id="adminName"></span>
      <a class="header-link" href="app.html">ダッシュボードに戻る</a>
      <button class="btn-logout" id="logoutBtn">ログアウト</button>
    </div>
  </header>

  <main class="container">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">全ユーザー数</div>
        <div class="stat-value" id="statTotal">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">有効ユーザー</div>
        <div class="stat-value" id="statActive">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">承認待ち</div>
        <div class="stat-value" id="statPending">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">無効ユーザー</div>
        <div class="stat-value" id="statDisabled">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">今日のアクティブ</div>
        <div class="stat-value" id="statToday">-</div>
        <div class="stat-sub">本日ログインしたユーザー</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">今週のアクティブ</div>
        <div class="stat-value" id="statWeek">-</div>
        <div class="stat-sub">直近7日間にログイン</div>
      </div>
    </div>

    <div class="section-card">
      <div class="section-title" style="margin-top:0;">ユーザー一覧</div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>名前</th>
              <th>メール</th>
              <th>ステータス</th>
              <th>ロール</th>
              <th>登録日</th>
              <th>最終ログイン</th>
              <th style="text-align:center;">ブックマーク</th>
              <th style="text-align:center;">コメント</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr><td colspan="9" class="empty-state">読み込み中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>

<script>
  let allUsers = [];
  let userActivityCounts = {};

  auth.onAuthStateChanged(async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }
    try {
      const userDoc = await db.collection('users').doc(user.uid).get();
      if (!userDoc.exists || userDoc.data().role !== 'admin') {
        window.location.href = 'app.html';
        return;
      }
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('pageContent').style.display = 'block';
      document.getElementById('adminName').textContent = userDoc.data().displayName || user.email;
      await loadUsers();
    } catch (err) {
      console.error('Admin check failed:', err);
      window.location.href = 'app.html';
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await auth.signOut();
    window.location.href = 'index.html';
  });

  async function loadUsers() {
    try {
      const snapshot = await db.collection('users').orderBy('createdAt', 'desc').get();
      allUsers = snapshot.docs.map(doc => ({ uid: doc.id, ...doc.data() }));
      renderStats();
      renderTable();
      loadAllActivityCounts();
    } catch (err) {
      console.error('Failed to load users:', err);
      document.getElementById('userTableBody').innerHTML = '<tr><td colspan="9" class="empty-state">読み込みに失敗しました</td></tr>';
    }
  }

  async function loadAllActivityCounts() {
    const subcollections = ['rd_bookmarks', 'rd_comments'];
    const promises = allUsers.map(async (user) => {
      const counts = {};
      await Promise.all(subcollections.map(async (sub) => {
        try {
          const snap = await db.collection('users').doc(user.uid).collection(sub).get();
          counts[sub] = snap.size;
        } catch (e) { counts[sub] = 0; }
      }));
      userActivityCounts[user.uid] = counts;
    });
    await Promise.all(promises);
    renderTable();
  }

  function renderStats() {
    const total = allUsers.length;
    const active = allUsers.filter(u => u.status === 'active').length;
    const pending = allUsers.filter(u => u.status === 'pending').length;
    const disabled = allUsers.filter(u => u.status === 'disabled').length;

    const now = new Date();
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const weekStart = new Date(todayStart);
    weekStart.setDate(weekStart.getDate() - 7);

    let todayActive = 0, weekActive = 0;
    allUsers.forEach(u => {
      if (!u.lastLogin) return;
      const loginDate = u.lastLogin.toDate ? u.lastLogin.toDate() : new Date(u.lastLogin);
      if (loginDate >= todayStart) todayActive++;
      if (loginDate >= weekStart) weekActive++;
    });

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statActive').textContent = active;
    document.getElementById('statPending').textContent = pending;
    document.getElementById('statDisabled').textContent = disabled;
    document.getElementById('statToday').textContent = todayActive;
    document.getElementById('statWeek').textContent = weekActive;
  }

  function renderTable() {
    const tbody = document.getElementById('userTableBody');
    if (allUsers.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" class="empty-state">ユーザーがいません</td></tr>';
      return;
    }

    tbody.innerHTML = allUsers.map(user => {
      const statusBadge = getStatusBadge(user.status);
      const roleBadge = getRoleBadge(user.role);
      const createdAt = formatTimestamp(user.createdAt);
      const lastLogin = formatTimestamp(user.lastLogin);
      const actions = buildActions(user);

      const counts = userActivityCounts[user.uid];
      const bookmarks = counts ? counts.rd_bookmarks : '-';
      const comments = counts ? counts.rd_comments : '-';
      const countClass = (val) => val === 0 ? 'activity-count zero' : 'activity-count';

      return `<tr>
        <td>${escapeHtml(user.displayName || '-')}</td>
        <td>${escapeHtml(user.email || '-')}</td>
        <td>${statusBadge}</td>
        <td>${roleBadge}</td>
        <td>${createdAt}</td>
        <td>${lastLogin}</td>
        <td class="${typeof bookmarks === 'number' ? countClass(bookmarks) : 'activity-count'}">${bookmarks}</td>
        <td class="${typeof comments === 'number' ? countClass(comments) : 'activity-count'}">${comments}</td>
        <td class="actions">${actions}</td>
      </tr>`;
    }).join('');
  }

  function getStatusBadge(status) {
    const map = { pending: { label: '承認待ち', cls: 'badge-pending' }, active: { label: '有効', cls: 'badge-active' }, disabled: { label: '無効', cls: 'badge-disabled' } };
    const info = map[status] || { label: status || '-', cls: '' };
    return `<span class="badge ${info.cls}">${info.label}</span>`;
  }

  function getRoleBadge(role) {
    const map = { admin: { label: '管理者', cls: 'badge-admin' }, user: { label: 'ユーザー', cls: 'badge-user' } };
    const info = map[role] || { label: role || '-', cls: '' };
    return `<span class="badge ${info.cls}">${info.label}</span>`;
  }

  function formatTimestamp(ts) {
    if (!ts) return '-';
    const date = ts.toDate ? ts.toDate() : new Date(ts);
    if (isNaN(date.getTime())) return '-';
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    const h = String(date.getHours()).padStart(2, '0');
    const min = String(date.getMinutes()).padStart(2, '0');
    return `${y}/${m}/${d} ${h}:${min}`;
  }

  function buildActions(user) {
    const buttons = [];
    if (user.status === 'pending') buttons.push(`<button class="btn btn-approve" onclick="updateUser('${user.uid}', 'status', 'active')">承認</button>`);
    if (user.status === 'active') buttons.push(`<button class="btn btn-disable" onclick="updateUser('${user.uid}', 'status', 'disabled')">無効化</button>`);
    if (user.status === 'disabled') buttons.push(`<button class="btn btn-enable" onclick="updateUser('${user.uid}', 'status', 'active')">有効化</button>`);
    if (user.role === 'user') buttons.push(`<button class="btn btn-promote" onclick="updateUser('${user.uid}', 'role', 'admin')">管理者に昇格</button>`);
    if (user.role === 'admin') buttons.push(`<button class="btn btn-demote" onclick="updateUser('${user.uid}', 'role', 'user')">ユーザーに降格</button>`);
    return buttons.join('');
  }

  async function updateUser(uid, field, value) {
    document.querySelectorAll('.btn').forEach(b => b.disabled = true);
    try {
      await db.collection('users').doc(uid).update({ [field]: value });
      const user = allUsers.find(u => u.uid === uid);
      if (user) user[field] = value;
      renderStats();
      renderTable();
    } catch (err) {
      console.error('Failed to update user:', err);
      alert('ユーザーの更新に失敗しました: ' + err.message);
      document.querySelectorAll('.btn').forEach(b => b.disabled = false);
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>
</body>
</html>
